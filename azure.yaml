# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: acs-voice-agent
metadata:
  template: acs-voice-agent

services:
  web:
    project: .
    host: appservice
    language: csharp

# Hooks for agent lifecycle management via azd
hooks:
  # After provisioning infrastructure, create the Foundry Agent
  postprovision:
    windows:
      shell: pwsh
      run: |
        # --- Generate appsettings.Development.json ---
        Write-Host "Generating appsettings.Development.json from provisioned resources..." -ForegroundColor Cyan
        $settings = @{
          Logging = @{
            LogLevel = @{ Default = "Information"; "Microsoft.AspNetCore" = "Warning" }
            ApplicationInsights = @{ LogLevel = @{ Default = "Information" } }
          }
          AllowedHosts = "*"
          DevTunnelUri = ""
          AcsConnectionString = $env:ACS_CONNECTION_STRING
          VoiceLiveEndpoint = $env:PROJECT_ENDPOINT
          FoundryAgentName = $env:FOUNDRY_AGENT_NAME
          FoundryProjectName = $env:PROJECT_NAME
          FoundryAgentVersion = ""
          TransferPhoneNumber = $env:TRANSFER_PHONE_NUMBER
        }
        $settings | ConvertTo-Json -Depth 3 | Set-Content -Path "appsettings.Development.json" -Encoding UTF8
        Write-Host "appsettings.Development.json created successfully"
        Write-Host "NOTE: Set DevTunnelUri to your dev tunnel URL before running locally"
        Write-Host "NOTE: FoundryAgentVersion will be set after agent creation below"
        Write-Host ""

        # --- Create Foundry Agent ---
        Write-Host "=== Creating Foundry Voice Live Agent ===" -ForegroundColor Cyan
        Write-Host ""

        # Create the agent
        $output = dotnet run --project scripts/AgentManager -- create 2>&1 | Tee-Object -Variable outputLines

        # Extract and save resource IDs to azd env
        foreach ($line in $outputLines) {
          if ($line -match "AGENT_ID:\s*(\S+)") {
            $agentId = $Matches[1]
            azd env set AGENT_ID $agentId
            Write-Host "Saved AGENT_ID: $agentId" -ForegroundColor Green
          }
          if ($line -match "VECTORSTORE_ID:\s*(\S+)") {
            $vsId = $Matches[1]
            azd env set VECTORSTORE_ID $vsId
            Write-Host "Saved VECTORSTORE_ID: $vsId" -ForegroundColor Green
          }
          if ($line -match "FILE_ID:\s*(\S+)") {
            $fileId = $Matches[1]
            azd env set FILE_ID $fileId
            Write-Host "Saved FILE_ID: $fileId" -ForegroundColor Green
          }
        }

        # Update App Service with agent version
        $webAppName = azd env get-value SERVICE_WEB_NAME 2>$null
        $resourceGroup = azd env get-value AZURE_RESOURCE_GROUP 2>$null
        if ($agentId -and $webAppName -and $resourceGroup) {
          $version = ($agentId -split ':')[-1]
          Write-Host "Setting FoundryAgentVersion=$version on $webAppName..." -ForegroundColor Yellow
          # Retry up to 6 times (30s total) waiting for App Service to be available in ARM
          $retries = 0
          $maxRetries = 6
          $success = $false
          while (-not $success -and $retries -lt $maxRetries) {
            $result = az webapp config appsettings set -g $resourceGroup -n $webAppName --settings "FoundryAgentVersion=$version" --output none 2>&1
            if ($LASTEXITCODE -eq 0) {
              $success = $true
            } else {
              $retries++
              Write-Host "App Service not ready yet, retrying in 5s ($retries/$maxRetries)..." -ForegroundColor Yellow
              Start-Sleep -Seconds 5
            }
          }
          if (-not $success) {
            Write-Host "WARNING: Could not set FoundryAgentVersion on App Service. Set it manually:" -ForegroundColor Red
            Write-Host "  az webapp config appsettings set -g $resourceGroup -n $webAppName --settings FoundryAgentVersion=$version" -ForegroundColor Red
          }
        }
    posix:
      shell: bash
      run: |
        # --- Generate appsettings.Development.json ---
        echo "Generating appsettings.Development.json from provisioned resources..."
        cat > appsettings.Development.json << EOF
        {
          "Logging": {
            "LogLevel": {
              "Default": "Information",
              "Microsoft.AspNetCore": "Warning"
            },
            "ApplicationInsights": {
              "LogLevel": {
                "Default": "Information"
              }
            }
          },
          "AllowedHosts": "*",
          "DevTunnelUri": "",
          "AcsConnectionString": "$ACS_CONNECTION_STRING",
          "VoiceLiveEndpoint": "$PROJECT_ENDPOINT",
          "FoundryAgentName": "$FOUNDRY_AGENT_NAME",
          "FoundryProjectName": "$PROJECT_NAME",
          "FoundryAgentVersion": "",
          "TransferPhoneNumber": "$TRANSFER_PHONE_NUMBER"
        }
        EOF
        echo "appsettings.Development.json created successfully"
        echo "NOTE: Set DevTunnelUri to your dev tunnel URL before running locally"
        echo "NOTE: FoundryAgentVersion will be set after agent creation below"
        echo ""

        # --- Create Foundry Agent ---
        echo "=== Creating Foundry Voice Live Agent ==="
        echo ""

        # Create the agent and capture output
        output=$(dotnet run --project scripts/AgentManager -- create 2>&1)
        echo "$output"

        # Extract and save resource IDs to azd env
        agent_id=$(echo "$output" | grep -oP 'AGENT_ID:\s*\K\S+' | head -1)
        vs_id=$(echo "$output" | grep -oP 'VECTORSTORE_ID:\s*\K\S+' | head -1)
        file_id=$(echo "$output" | grep -oP 'FILE_ID:\s*\K\S+' | head -1)

        if [ -n "$agent_id" ]; then
          azd env set AGENT_ID "$agent_id"
          echo "Saved AGENT_ID: $agent_id"
        fi
        if [ -n "$vs_id" ]; then
          azd env set VECTORSTORE_ID "$vs_id"
          echo "Saved VECTORSTORE_ID: $vs_id"
        fi
        if [ -n "$file_id" ]; then
          azd env set FILE_ID "$file_id"
          echo "Saved FILE_ID: $file_id"
        fi

        # Update App Service with agent version
        web_app_name=$(azd env get-value SERVICE_WEB_NAME 2>/dev/null)
        resource_group=$(azd env get-value AZURE_RESOURCE_GROUP 2>/dev/null)
        if [ -n "$agent_id" ] && [ -n "$web_app_name" ] && [ -n "$resource_group" ]; then
          version="${agent_id##*:}"
          echo "Setting FoundryAgentVersion=$version on $web_app_name..."
          # Retry up to 6 times (30s total) waiting for App Service to be available in ARM
          retries=0
          max_retries=6
          success=false
          while [ "$success" = false ] && [ $retries -lt $max_retries ]; do
            if az webapp config appsettings set -g "$resource_group" -n "$web_app_name" --settings "FoundryAgentVersion=$version" --output none 2>/dev/null; then
              success=true
            else
              retries=$((retries + 1))
              echo "App Service not ready yet, retrying in 5s ($retries/$max_retries)..."
              sleep 5
            fi
          done
          if [ "$success" = false ]; then
            echo "WARNING: Could not set FoundryAgentVersion on App Service. Set it manually:"
            echo "  az webapp config appsettings set -g $resource_group -n $web_app_name --settings FoundryAgentVersion=$version"
          fi
        fi

  # Runs after every 'azd deploy' and 'azd up' — ensures EventGrid always points to this environment
  postdeploy:
    windows:
      shell: pwsh
      run: |
        Write-Host "Configuring EventGrid subscription for IncomingCall events..." -ForegroundColor Cyan
        $acsResourceId = az communication show --name $env:ACS_RESOURCE_NAME --resource-group $env:ACS_RESOURCE_GROUP --query "id" -o tsv
        $webhookUrl = "$env:SERVICE_WEB_URI/api/incomingCall"
        $subName = "incoming-call"
        $body = @{
          properties = @{
            destination = @{
              endpointType = "WebHook"
              properties = @{ endpointUrl = $webhookUrl }
            }
            filter = @{
              includedEventTypes = @("Microsoft.Communication.IncomingCall")
            }
          }
        } | ConvertTo-Json -Depth 5 -Compress
        $tmpFile = [System.IO.Path]::GetTempFileName()
        $body | Out-File -FilePath $tmpFile -Encoding utf8 -NoNewline
        az rest --method PUT --uri "https://management.azure.com${acsResourceId}/providers/Microsoft.EventGrid/eventSubscriptions/${subName}?api-version=2024-06-01-preview" --body "@$tmpFile" --headers "Content-Type=application/json"
        Remove-Item $tmpFile -ErrorAction SilentlyContinue
        Write-Host "EventGrid subscription '$subName' configured to $webhookUrl"
    posix:
      shell: bash
      run: |
        echo "Configuring EventGrid subscription for IncomingCall events..."
        ACS_RESOURCE_ID=$(az communication show --name "$ACS_RESOURCE_NAME" --resource-group "$ACS_RESOURCE_GROUP" --query "id" -o tsv)
        WEBHOOK_URL="$SERVICE_WEB_URI/api/incomingCall"
        SUB_NAME="incoming-call"
        TMPFILE=$(mktemp)
        cat > "$TMPFILE" << EOJSON
        {"properties":{"destination":{"endpointType":"WebHook","properties":{"endpointUrl":"${WEBHOOK_URL}"}},"filter":{"includedEventTypes":["Microsoft.Communication.IncomingCall"]}}}
        EOJSON
        az rest --method PUT --uri "https://management.azure.com${ACS_RESOURCE_ID}/providers/Microsoft.EventGrid/eventSubscriptions/${SUB_NAME}?api-version=2024-06-01-preview" --body @"$TMPFILE" --headers "Content-Type=application/json"
        rm -f "$TMPFILE"
        echo "EventGrid subscription '$SUB_NAME' configured to $WEBHOOK_URL"

  # Before tearing down infrastructure, delete the agent and resources
  predown:
    windows:
      shell: pwsh
      run: |
        Write-Host "=== Deleting Foundry Voice Live Agent ===" -ForegroundColor Cyan
        Write-Host ""

        $agentId = $env:AGENT_ID

        if ([string]::IsNullOrEmpty($agentId)) {
          Write-Host "No AGENT_ID found in environment. Skipping agent deletion." -ForegroundColor Yellow
          exit 0
        }

        # Delete the agent and resources
        dotnet run --project scripts/AgentManager -- delete

        # Clear the IDs from env
        azd env set AGENT_ID ""
        azd env set VECTORSTORE_ID ""
        azd env set FILE_ID ""
    posix:
      shell: bash
      run: |
        echo "=== Deleting Foundry Voice Live Agent ==="
        echo ""

        if [ -z "$AGENT_ID" ]; then
          echo "No AGENT_ID found in environment. Skipping agent deletion."
          exit 0
        fi

        # Delete the agent and resources
        dotnet run --project scripts/AgentManager -- delete

        # Clear the IDs from env
        azd env set AGENT_ID ""
        azd env set VECTORSTORE_ID ""
        azd env set FILE_ID ""
